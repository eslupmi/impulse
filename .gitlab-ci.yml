stages:
  - check_code
  - check_merge
  - check_package
  - release
  - build_binary
  - packaging
  - create_manifest
  - create_tar
  - docs
  - deploy

variables:
  CREATE_DEB: "false"
  CREATE_IMAGE: "true"
  CREATE_RPM: "false"
  ARCH: "amd64"  
  BUILD_ARCH: "amd64"
  GITLAB_ADVANCED_SAST_ENABLED: "true"
  
include:
  - project: 'devops/ci/semci'
    ref: master
    file:
      - '.gitlab-ci.yml'

deploy:
  stage: deploy
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ "/^(master|main)$/" && $CI_COMMIT_MESSAGE =~ /^Merge.*/'
      when: on_success
    - when: never
  variables:
    ROLLBACK_TIMEOUT: "60"
  script:
    - |
      set -Eeuo pipefail

      cd /opt/monitoring/impulse

      echo "Logging into registry: $CI_REGISTRY"
      docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

      # Сохраняем предыдущий SEMVER (для отката)
      PREV_SEMVER=""
      if [ -f .env ]; then
        cp .env .env.bak || true
        if grep -q '^SEMVER=' .env; then
          PREV_SEMVER="$(grep '^SEMVER=' .env | cut -d= -f2-)"
        fi
      fi
      echo "Previous SEMVER ${PREV_SEMVER:-<none>}"

      wait_for_services() {
        local timeout="${1:-60}"
        local interval=3
        local elapsed=0

        local expected
        expected="$(docker compose config --services | wc -l | tr -d ' ')"
        if [ "$expected" -eq 0 ]; then
          echo "No services defined in compose file" >&2
          return 1
        fi

        while [ "$elapsed" -lt "$timeout" ]; do
          local all_ok=1

          local count
          count="$(docker compose ps -q | wc -l | tr -d ' ')"

          # Контейнеров меньше, чем описано сервисов — ещё не все поднялись
          if [ "$count" -lt "$expected" ]; then
            all_ok=0
          else
            for cid in $(docker compose ps -q); do
              status="$(docker inspect -f '{{.State.Status}}' "$cid")"
              health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid")"

              if [ "$status" != "running" ]; then
                all_ok=0
                echo "Container $cid status=$status"
                break
              fi

              # Если healthcheck есть, требуем healthy
              if [ "$health" != "none" ] && [ "$health" != "healthy" ]; then
                all_ok=0
                echo "Container $cid health=$health"
                break
              fi
            done
          fi

          if [ "$all_ok" -eq 1 ]; then
            return 0
          fi

          sleep "$interval"
          elapsed=$((elapsed + interval))
        done

        return 1
      }

      rollback() {
        echo "Deployment failed. Starting rollback..."
        if [ -n "${PREV_SEMVER}" ]; then
          echo "Rolling back to SEMVER=$PREV_SEMVER"
          echo "SEMVER=$PREV_SEMVER" > .env
          docker compose pull || true
          docker compose up -d

          echo "Waiting for rollback containers to become healthy..."
          if wait_for_services "${ROLLBACK_TIMEOUT}"; then
            echo "Rollback succeeded to $PREV_SEMVER"
          else
            echo "Rollback attempted but services are still not healthy. Manual intervention required." >&2
          fi
        elif [ -f .env.bak ]; then
          echo "No previous SEMVER detected, restoring .env.bak"
          mv -f .env.bak .env
          docker compose pull || true
          docker compose up -d
        else
          echo "No previous version to rollback to." >&2
        fi

        docker logout || true
        exit 1
      }

      trap 'rollback' ERR

      echo "Deploying new SEMVER=$SEMVER"
      echo "SEMVER=$SEMVER" > .env

      echo "Pulling images..."
      docker compose pull

      echo "Starting services..."
      docker compose up -d

      echo "Verifying services health (timeout ${ROLLBACK_TIMEOUT}s)..."
      if ! wait_for_services "${ROLLBACK_TIMEOUT}"; then
        echo "New deployment did not become healthy in time." >&2
        false  # триггер ERR и откат
      fi

      echo "New version $SEMVER successfully deployed."
      docker logout

      echo "Новая версия $SEMVER успешно задеплоена!"
  tags: 
    - grafana 

      