<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMPulse</title>
    {% set static_base = http_prefix + "/static" if http_prefix else "/static" %}
    <link rel="icon" type="image/x-icon" href="{{ static_base }}/favicon.ico">
    <!-- External Libraries -->
    <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet">
    <script type="text/javascript" src="{{ static_base }}/js/vendor/tabulator.min.js"></script>
    <script src="{{ static_base }}/js/vendor/luxon.min.js" defer></script>
    <script src="{{ static_base }}/js/vendor/fullcalendar.index.global.js" defer></script>
    <script src="{{ static_base }}/js/vendor/fullcalendar-luxon3.index.global.js" defer></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" type="text/css" href="{{ static_base }}/css/style.css">
    <link rel="stylesheet" type="text/css" href="{{ static_base }}/css/filters.css">
    <link rel="stylesheet" type="text/css" href="{{ static_base }}/css/responsive.css">
    <link rel="stylesheet" type="text/css" href="{{ static_base }}/css/chains.css">
    <link rel="stylesheet" type="text/css" href="{{ static_base }}/css/maintenance.css">
</head>
<body>
    <div id="table-wrapper">
        <div id="filter-wrapper">
            <div id="scrollable-filters">
                <div class="arrow-wrapper left">
                    <button class="scroll-arrow left">
                        <svg width="8" height="14" viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M7 13L1 7L7 1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div id="filter-container"><div id="filter-list"></div></div>
                <div class="arrow-wrapper right">
                    <button class="scroll-arrow right">
                        <svg width="8" height="14" viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M1 1L7 7L1 13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="filter-controls">
                <div class="filter-input-wrapper">
                    <label for="filter-input" class="hidden-text">Filters</label>
                    <input id="filter-input" type="text" placeholder='e.g. severity=~"critical|warning"'>
                    <button id="add-filter-btn">
                        <svg width="16" height="16" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10.5 10.5L8.325 8.325M9.5 5.5C9.5 7.70914 7.70914 9.5 5.5 9.5C3.29086 9.5 1.5 7.70914 1.5 5.5C1.5 3.29086 3.29086 1.5 5.5 1.5C7.70914 1.5 9.5 3.29086 9.5 5.5Z" stroke="var(--search-icon-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="filter-error" class="hidden"></div>
        <div id="data-table"></div>
    </div>
    <div class="online-status-wrapper">
        <div class="online-status-indicator"></div>
    </div>
    <footer class="app-footer">
        <div class="bottom-controls">
            <div class="bottom-controls-right">
                <div id="privileged-footer-controls" class="privileged-footer-controls"></div>
                <button id="theme-toggle" class="control-btn" title="Toggle theme">
                    <svg class="theme-icon sun-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8.00033 0.666504V1.99984M8.00033 13.9998V15.3332M2.81366 2.81317L3.76033 3.75984M12.2403 12.2398L13.187 13.1865M0.666992 7.99984H2.00033M14.0003 7.99984H15.3337M2.81366 13.1865L3.76033 12.2398M12.2403 3.75984L13.187 2.81317M11.3337 7.99984C11.3337 9.84079 9.84128 11.3332 8.00033 11.3332C6.15938 11.3332 4.66699 9.84079 4.66699 7.99984C4.66699 6.15889 6.15938 4.6665 8.00033 4.6665C9.84128 4.6665 11.3337 6.15889 11.3337 7.99984Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <svg class="theme-icon moon-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13.9999 8.52667C13.8951 9.66147 13.4692 10.7429 12.7721 11.6445C12.075 12.5461 11.1356 13.2305 10.0637 13.6177C8.99188 14.0049 7.83192 14.0787 6.7196 13.8307C5.60728 13.5827 4.5886 13.023 3.78275 12.2172C2.97691 11.4113 2.41723 10.3927 2.16921 9.28033C1.92118 8.16801 1.99508 7.00806 2.38224 5.9362C2.7694 4.86434 3.45382 3.92491 4.35541 3.22784C5.257 2.53076 6.33847 2.10487 7.47327 2C6.80888 2.89884 6.48917 4.0063 6.57229 5.12094C6.65541 6.23559 7.13584 7.28337 7.9262 8.07373C8.71656 8.86409 9.76435 9.34452 10.879 9.42765C11.9936 9.51077 13.1011 9.19106 13.9999 8.52667Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="history-toggle" class="history-toggle-btn" title="Show all incidents">
                    <svg class="history-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3.03301 1.2665V4.59984H6.36634" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2.72634 8.6665C3.05574 10.0512 3.83984 11.2858 4.95327 12.1721C6.06669 13.0584 7.44511 13.5445 8.86826 13.5528C10.2914 13.5611 11.6753 13.091 12.799 12.2178C13.9227 11.3446 14.7211 10.1191 15.0667 8.73834C15.4122 7.35755 15.2854 5.90018 14.7061 4.60023C14.1268 3.30028 13.1289 2.23029 11.8707 1.56195C10.6124 0.893611 9.16631 0.665649 7.76396 0.914686C6.36161 1.16372 5.08295 1.8755 4.13301 2.93984L3.03301 4.59984" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M7.99967 4.6665V7.99984L10.6663 9.33317" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="auth-controls-wrapper" id="auth-controls">
                    <span id="auth-username" class="auth-username"></span>
                    <span id="auth-separator" class="auth-separator">|</span>
                    <button id="auth-login-btn" class="auth-login-btn">Login</button>
                    <button id="auth-logout-btn" class="auth-logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </footer>
    <div id="chains-modal" class="chains-modal">
        <div class="chains-modal-content">
            <div class="chains-modal-header">
                <h2>UI Chains</h2>
                <div class="chains-header-controls">
                    <label for="chain-select", class="hidden-text">Chain</label>
                    <select id="chain-select" class="chain-select" title="Chain to display">
                    </select>
                    <label for="timezone-select", class="hidden-text">Timezone</label>
                    <select id="timezone-select" class="timezone-select">
                    </select>
                    <button class="chains-modal-close">&times;</button>
                </div>
            </div>
            <div class="chains-modal-body">
                <div id="chains-wrapper">
                    <div id="calendar-container" class="chains-calendar-hidden">
                        <div id="calendar-wrapper">
                            <div id="calendar-nav">
                                <div class="calendar-nav-left">
                                    <button id="calendar-today" class="calendar-today-btn">today</button>
                                </div>
                                <div class="calendar-nav-right">
                                    <div id="week-number-display"></div>
                                    <div>
                                        <button id="calendar-prev" class="calendar-nav-btn"></button>
                                        <button id="calendar-next" class="calendar-nav-btn"></button>
                                    </div>
                                </div>
                            </div>
                            <div id="calendar"></div>
                        </div>
                        <div id="month-calendar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="maintenance-modal" class="chains-modal">
        <div class="chains-modal-content maintenance-modal-content">
            <div class="chains-modal-header">
                <h2>Maintenance</h2>
                <div class="chains-header-controls">
                    <label for="maintenance-timezone-select", class="hidden-text">Timezone</label>
                    <select id="maintenance-timezone-select" class="timezone-select" title="Timezone"></select>
                    <button class="chains-modal-close maintenance-modal-close">&times;</button>
                </div>
            </div>
            <div class="chains-modal-body">
                <div class="maintenance-layout">
                    <div class="maintenance-list-wrap">
                        <div id="maintenance-rows" class="maintenance-list"></div>
                        <div class="maintenance-add-bar">
                            <button type="button" id="maintenance-add-row" class="maintenance-add-btn" title="Add maintenance window">+</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="maintenance-interval-overlay" class="maintenance-interval-overlay hidden">
                <div class="maintenance-interval-dialog">
                    <div class="maintenance-interval-header">
                        <span>Select time interval</span>
                        <button type="button" id="maintenance-interval-close" class="maintenance-interval-close">&times;</button>
                    </div>
                    <div id="maintenance-interval-mount"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="chain-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">New shift</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="chain-start">Start</label>
                    <input type="text" id="chain-start" placeholder="e.g. 2024-03-06, 16:45">
                </div>
                <div class="form-group">
                    <label for="chain-end">End</label>
                    <input type="text" id="chain-end" placeholder="e.g. 2024-03-06, 18:00">
                </div>
                <div class="form-group">
                    <label for="chain-repeat">Repeat</label>
                    <select id="chain-repeat">
                        <option value="">None</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>
                <div class="form-group hidden" id="chain-until-group">
                    <label for="chain-until">Until</label>
                    <input type="text" id="chain-until" placeholder="e.g. 2024-03-06, 18:00">
                </div>
                <div class="form-group">
                    <label>Steps</label>
                    <div id="steps-container"></div>
                    <button type="button" id="add-step-btn" class="btn btn-secondary">Add Step</button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" id="delete-chain-btn" class="btn btn-danger hidden">Delete</button>
                <button type="button" id="save-chain-btn" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>
    <script src="{{ static_base }}/js/main.js" type="module" defer></script>
</body>
</html>
