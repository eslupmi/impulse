name: _notify

on:
  workflow_call:
    secrets:
      RELEASE_TELEGRAM_BOT_TOKEN:
        required: true
      RELEASE_TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Notify Telegram
        env:
          RELEASE_TELEGRAM_BOT_TOKEN: ${{ secrets.RELEASE_TELEGRAM_BOT_TOKEN }}
          RELEASE_TELEGRAM_CHAT_ID: ${{ secrets.RELEASE_TELEGRAM_CHAT_ID }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BODY=$(awk -v tag="$TAG" '
            /^## / { if (found) exit; if ($0 == "## " tag) found=1; next }
            found { print }
          ' CHANGELOG.md)
          [ -n "$BODY" ] || { echo "Changelog not found for $TAG"; exit 1; }
          export BODY
          MESSAGE=$(python3 <<'PY'
          import os, re
          tag, body, repo = os.environ["TAG"], os.environ["BODY"], os.environ["REPO"]
          link = r"\[((?:[^[\]]|\[[^\]]*\])+)\]\(([^)]+)\)"
          fmt = re.compile(rf"`[^`]+`|\*\*[^*]+\*\*|{link}")

          def esc(s):
              return re.sub(r"([_*\[\]()~`>#+\-=|{}.!])", r"\\\1", s)

          def esc_url(s):
              return s.replace("\\", "\\\\").replace(")", "\\)")

          def esc_code(s):
              return s.replace("\\", "\\\\").replace("`", "\\`")

          def convert(s):
              out, last = [], 0
              for m in fmt.finditer(s):
                  out.append(esc(s[last:m.start()]))
                  c = m.group()
                  if c.startswith("`"):
                      out.append(f"`{esc_code(c[1:-1])}`")
                  elif c.startswith("**"):
                      out.append(f"*{esc(c[2:-2])}*")
                  else:
                      lm = re.match(link, c)
                      out.append(f"[{esc(lm.group(1))}]({esc_url(lm.group(2))})")
                  last = m.end()
              out.append(esc(s[last:]))
              return "".join(out)

          url = f"https://github.com/{repo}/releases/tag/{tag}"
          print(f"*[{esc('IMPulse ' + tag)}]({esc_url(url)})*\n\n{convert(body)}", end="")
          PY
          )
          [ ${#MESSAGE} -le 4096 ] || MESSAGE="${MESSAGE:0:4090}..."
          jq -n --arg chat_id "$RELEASE_TELEGRAM_CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, parse_mode: "MarkdownV2", disable_web_page_preview: true}' | \
          curl -fsS -X POST "https://api.telegram.org/bot${RELEASE_TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @-
