name: _notify

on:
  workflow_call:
    secrets:
      RELEASE_TELEGRAM_BOT_TOKEN:
        required: true
      RELEASE_TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Prepare message
        env:
          # TAG: ${{ github.ref_name }}
          TAG: "v3.0.0"
          REPO: ${{ github.repository }}
        run: |
          BODY=$(awk -v tag="$TAG" '
            /^## / { if (found) exit; if ($0 == "## " tag) found=1; next }
            found { print }
          ' CHANGELOG.md)
          [ -n "$BODY" ] || { echo "Changelog not found for $TAG"; exit 1; }
          export BODY
          python3 <<'PY'
          import html, os, re
          tag, body, repo = os.environ["TAG"], os.environ["BODY"], os.environ["REPO"]
          pat = re.compile(r"```[\s\S]*?```|`[^`]+`|\*\*[^*]+\*\*|_[^_]+_|\[[^\]]+\]\([^)]+\)|https?://[^\s<]+")

          def esc(s):
              return html.escape(s)

          def chunk(c):
              if c.startswith("```"):
                  inner = c[3:-3].strip("\n")
                  if "\n" in inner and inner.split("\n", 1)[0].isalpha():
                      inner = inner.split("\n", 1)[1]
                  return f"<pre>{esc(inner.rstrip())}</pre>"
              if c.startswith("`"):
                  return f"<code>{esc(c[1:-1])}</code>"
              if c.startswith("_"):
                  return f"<i>{esc(c[1:-1])}</i>"
              if c.startswith("**"):
                  return f"<b>{esc(c[2:-2])}</b>"
              if c.startswith("http"):
                  return f'<a href="{esc(c)}">{esc(c)}</a>'
              m = re.match(r"\[([^\]]+)\]\(([^)]+)\)", c)
              return f'<a href="{esc(m.group(2))}">{esc(m.group(1))}</a>'

          def convert(s):
              out, last = [], 0
              for m in pat.finditer(s):
                  out.append(esc(s[last:m.start()]))
                  out.append(chunk(m.group()))
                  last = m.end()
              out.append(esc(s[last:]))
              return "".join(out)

          url = f"https://github.com/{repo}/releases/tag/{tag}"
          msg = f"<b>IMPulse {esc(tag)}</b>\n\n{convert(body)}\n\n<a href=\"{esc(url)}\">Release</a>"
          open("message.txt", "w").write(msg)
          PY

      - uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.RELEASE_TELEGRAM_CHAT_ID }}
          token: ${{ secrets.RELEASE_TELEGRAM_BOT_TOKEN }}
          message_file: message.txt
          format: html
          disable_web_page_preview: true
