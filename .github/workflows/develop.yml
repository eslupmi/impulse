name: develop

concurrency:
  group: ${{ github.ref }}

on:
  push:
    branches:
    - 'develop'

permissions:
  contents: read
  packages: write

jobs:
  tests:
    uses: ./.github/workflows/_tests.yml

  build-and-push-image:
    needs: tests
    uses: ./.github/workflows/_build-and-push-image.yml

  cleanup-untagged-images:
    needs: build-and-push-image
    uses: ./.github/workflows/_cleanup-untagged-images.yml

  deploy:
    needs: build-and-push-image
    uses: ./.github/workflows/_deploy.yml
    with:
      deploy-path: /opt/impulse/dev
    secrets: inherit
