name: _tests

on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        default: ubuntu-24.04
      python-versions:
        type: string
        default: '["3.12"]'

jobs:
  tests:
    runs-on: ${{ inputs.runs-on }}
    strategy:
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Create config from none example
        run: |
          cp examples/impulse.none.yml impulse.yml
      
      - name: Run tests
        timeout-minutes: 10
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app:ro,Z" \
            -e DATA_PATH=/data \
            -w /app \
            python:${{ matrix.python-version }}-slim \
            sh -c "
              python -m pip install --upgrade pip && \
              pip install -r requirements.txt && \
              pip install -r tests.requirements.txt && \
              python -m pytest tests/ --color=yes -v
            "

