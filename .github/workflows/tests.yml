name: tests

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  tests:
    runs-on: ${{ inputs.runs-on }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create config from none example
        run: |
          cp examples/impulse.none.yml impulse.yml
      
      - name: Run tests
        timeout-minutes: 10
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/app:ro,Z" \
            -e DATA_PATH=/data \
            -w /app \
            python:${{ matrix.python-version }}-slim \
            sh -c "
              python -m pip install --upgrade pip && \
              pip install -r requirements.txt && \
              pip install -r requirements.test.txt && \
              python -m pytest tests/ --color=yes -v
            "

