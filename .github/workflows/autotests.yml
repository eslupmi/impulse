name: autotests

on:
  push:
    branches:
    - '[0-9]*-*'

jobs:
  autotests:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run autotests
        env:
          SLACK_VERIFICATION_TOKEN: ${{ secrets.AUTOTESTS_SLACK_VERIFICATION_TOKEN }}
          SLACK_BOT_USER_OAUTH_TOKEN: ${{ secrets.AUTOTESTS_SLACK_BOT_USER_OAUTH_TOKEN }}
          IMPULSE_URL: https://test.impulse.bot
        run: |
          docker run --rm \
            -e SLACK_VERIFICATION_TOKEN="$SLACK_VERIFICATION_TOKEN" \
            -e SLACK_BOT_USER_OAUTH_TOKEN="$SLACK_BOT_USER_OAUTH_TOKEN" \
            -e IMPULSE_URL="$IMPULSE_URL" \
            ghcr.io/eslupmi/tests:feature-tests

