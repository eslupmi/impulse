name: tags

concurrency:
  group: ${{ github.ref }}

on:
  push:
    tags:
    - 'v*'

jobs:
  build-and-push-image:
    uses: ./.github/workflows/modules/_build-and-push-image.yml

  cleanup-untagged-images:
    needs: build-and-push-image
    uses: ./.github/workflows/modules/_cleanup-untagged-images.yml
