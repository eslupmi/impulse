# Configuration details:   https://docs.impulse.bot/latest/config_file/

application:
  type: none

incident:
  timeouts:
    firing: 6h
    unknown: 6h
    resolved: 12h

route:
  channel: default

ui:
  columns:
    - name: status
      header: Status
      visible: false
      value: incident.status
    - name: created
      type: datetime
      header: Created
      value: incident.created
    - name: alertname
      header: Alertname
      type: link
      url: incident.link
      value: payload.commonLabels.alertname
    - name: service
      header: Service
      value: payload.commonLabels.service
    - name: severity
      header: Severity
      value: payload.commonLabels.severity
  sorting:
    - severity: desc
      order: ["info", "warning", "critical"]
    - created: desc
  colors:
    severity:
      critical: "#FF0000"
      warning: "#FFA500"
      info: "#00FF00"
