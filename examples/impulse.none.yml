messenger:  # messenger configuration
  type: none  # messenger type (mattermost, none, slack, telegram)

incident:  # incidents behavior options
  # notifications:  # incident notifications settings
  #   assignment: True  # enable/disable notifications about incident assignment changes
  #   new_firing: True  # notification about new firing instances
  #   partial_resolved: False  # nofitication about some resolved instances
  timeouts:  # incident status timeouts (https://docs.impulse.bot/stable/concepts/#lifecycle)
    firing: 6h  # after this time, incident status changes from 'firing' to 'unknown' if no alerts appear
    unknown: 6h  # after this time, incident status changes from 'unknown' to 'closed' if no alerts appear
    resolved: 12h  # after this time, incident status changes from 'resolved' to 'closed' if no alerts appear

ui:  # user interface configuration (https://docs.impulse.bot/stable/ui/)
  colors:  # Color scheme for different values (https://docs.impulse.bot/stable/config_file/#uicolors)
    severity:
      critical: "#FF0000"
      warning: "#FFA500"
      info: "#00FF00"
  columns:  # defines the columns that are used in the user interface (https://docs.impulse.bot/stable/config_file/#uicolumns)
    - name: status  # unique identifier for the column, used for filtering and sorting
      header: Status  # display name shown in the column header
      visible: False  # whether the column is visible by default in the UI. Invisible columns can be used in search fields
      value: incident.status  # data source variable (https://docs.impulse.bot/stable/config_file/#uicolumnsvalue)
    - name: created
      header: Created
      type: datetime  # column data type that determines how the value is rendered (https://docs.impulse.bot/stable/config_file/#uicolumnstype)
      value: incident.created
    - name: alertname
      header: Alertname
      type: link
      url: incident.link  # variable containing the required link (used with type: link)
      value: payload.commonLabels.alertname
    - name: service
      header: Service
      value: payload.commonLabels.service
    - name: severity
      header: Severity
      value: payload.commonLabels.severity
    - name: assigned
      header: Assigned To
      value: incident.assigned_fullname
  filters:  # defines the default filters applied in the user interface (https://docs.impulse.bot/stable/config_file/#uifilters)
    - severity=~"warning|critical"
  sorting:  # the default column sorting order (https://docs.impulse.bot/stable/config_file/#uisorting)
    - severity: desc
      order: ["info", "warning", "critical"]
    - created: desc

webhooks:  # webhooks provide alternative notification options via HTTP POST requests to custom endpoints
  Dmitry_call:
    url: 'https://api.twilio.com/2010-04-01/Accounts/{{ env["TWILIO_ACCOUNT_SID"] }}/Calls.json'  # URL to which the HTTP POST request will be sent
    data:  # data to be sent in the POST request body
      To: '+998123456789'
      From: '{{ env["TWILIO_NUMBER"] }}'
      Url: http://example.com/twiml.xml
    auth: '{{ env["TWILIO_ACCOUNT_SID"] }}:{{ env["TWILIO_AUTH_TOKEN"] }}'  # string for HTTP Basic Auth (e.g., user:password)
