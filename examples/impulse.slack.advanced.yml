# Configuration details:   https://docs.impulse.bot/latest/config_file/

application:
  type: slack
  admin_users: ["Dmitry"]
  users:
    Dmitry: {id: U73MD1YLR4M}
    Valery: {id: X58QP9ZKT2N}
    Grigory: {id: V64JRM8YB3L}
    CEO: {id: T97PLX2QK5M}
  user_groups:
    devops: {users: ["Dmitry", "Valery"]}
  channels:
    incidents_default: {id: X93QPLZ742MJ}
    incidents_infrastructure: {id: B57RTNX836FK}
    incidents_services: {id: Y24JQMVL859P}
  template_files:
    status_icons: templates/slack_status_icons.j2
    header: templates/slack_header.j2
    body: templates/slack_body.j2
  chains:
    devops:
      - user_group: devops
    devops_critical:
      - user: Valery
      - wait: 10m
      - user: Dmitry
      - wait: 10m
      - webhook: Dmitry_call
    developers:
      - user: Dmitry
      - wait: 10m
      - user: Valery
      - wait: 20m
      - user: CEO

incident:
  alerts_firing_notifications: False 
  alerts_resolved_notifications: False
  timeouts:
    firing: 6h
    unknown: 6h
    resolved: 12h

webhooks:
  Dmitry_call:
    url: 'https://api.twilio.com/2010-04-01/Accounts/{{ env["TWILIO_ACCOUNT_SID"] }}/Calls.json'
    data:
      To: '+998123456789'
      From: '{{ env["TWILIO_NUMBER"] }}'
      Url: http://example.com/twiml.xml
    auth: '{{ env["TWILIO_ACCOUNT_SID"] }}:{{ env["TWILIO_AUTH_TOKEN"] }}'

route:
  channel: incidents_default
  routes:
    - matchers:
        - service=~"nginx|postgresql"
      channel: incidents_infrastructure
      chain: devops
      routes:
        - matchers:
            - severity="critical"
          channel: incidents_infrastructure
          chain: devops_critical
    - matchers:
        - service=~"vscode|pycharm"
      channel: incidents_services
      chain: developers

ui:
  columns:
    - name: status
      header: Status
      visible: false
      value: incident.status
    - name: created
      type: datetime
      header: Created
      value: incident.created
    - name: alertname
      header: Alertname
      type: link
      url: incident.link
      value: payload.commonLabels.alertname
    - name: service
      header: Service
      value: payload.commonLabels.service
    - name: severity
      header: Severity
      value: payload.commonLabels.severity
  sorting:
    - severity: desc
      order: ["info", "warning", "critical"]
    - created: desc
  colors:
    severity:
      critical: "#FF0000"
      warning: "#FFA500"
      info: "#00FF00"
