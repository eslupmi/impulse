# Configuration details:   https://docs.impulse.bot/latest/config_file/
# Examples:                https://docs.impulse.bot/latest/config_examples/

application:
  type: mattermost
  team: ESLUPMI
  address: https://<your_mattermost_domain>
  impulse_address: https://<your_impulse_domain>

  admin_users: ["Dmitry"]
  users:
    Dmitry: {id: ic8pft3ac7rjrd9eopxp4kc7qy}
    Valery: {id: b9pft7xc3rjqrd2eokxp4na8y5}
    Grigory: {id: x7qjrd5np4k8yc3ft9aeopxr2t}
  user_groups:
    devops: {users: ["Dmitry", "Valery"]}
  channels:
    incidents_default: {id: x7vjmyp94zsb3lnk2afqt6hcdu}
    incidents_infrastructure: {id: w9tkqnx57yrc8dmg3bflz2pvha}
    incidents_services: {id: m5zqv8xr2ypkt3ln7fdaw6jcb9}

  chains:
    devops:
      - user_group: devops
    devops_critical:
      - user: Valery
      - wait: 10m
      - user: Dmitry
      - wait: 10m
      - webhook: Dmitry_call
    developers:
      - user: Dmitry
      - wait: 10m
      - user: Valery
      - wait: 20m
      - user: CEO

incident:
  alerts_firing_notifications: False 
  alerts_resolved_notifications: False
  timeouts:
    firing: 6h
    unknown: 6h
    resolved: 12h

webhooks:
  Dmitry_call:
    url: 'https://api.twilio.com/2010-04-01/Accounts/{{ env["TWILIO_ACCOUNT_SID"] }}/Calls.json'
    data:
      To: '+998123456789'
      From: '{{ env["TWILIO_NUMBER"] }}'
      Url: http://example.com/twiml.xml
    auth: '{{ env["TWILIO_ACCOUNT_SID"] }}:{{ env["TWILIO_AUTH_TOKEN"] }}'

route:
  channel: incidents_default
  routes:
    - matchers:
        - service=~"nginx|postgresql"
      channel: incidents_infrastructure
      chain: devops
      routes:
        - matchers:
            - severity="critical"
          channel: incidents_infrastructure
          chain: devops_critical
    - matchers:
        - service=~"vscode|pycharm"
      channel: incidents_services
      chain: developers
