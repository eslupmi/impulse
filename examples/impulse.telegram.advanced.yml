# Configuration details:   https://docs.impulse.bot/latest/config_file/

application:
  type: telegram
  impulse_address: https://<your_impulse_domain> # Due to Telegram's restrictions, only HTTPS is supported
  admin_users: ["Dmitry"]
  users:
    Dmitry: {id: 182547693}
    Valery: {id: 175329864}
    Grigory: {id: 163985742}
  user_groups:
    devops: {users: ["Dmitry", "Valery"]}
  channels:
    incidents_default: {id: -1003748296153}
    incidents_infrastructure: {id: -1005896723417}
    incidents_services: {id: -1009182765432}
  template_files:
    status_icons: templates/telegram_status_icons.j2
    header: templates/telegram_header.j2
    body: templates/telegram_body.j2
  chains:
    devops:
      - user_group: devops
    devops_critical:
      - user: Valery
      - wait: 10m
      - user: Dmitry
      - wait: 10m
      - webhook: Dmitry_call
    developers:
      - user: Dmitry
      - wait: 10m
      - user: Valery
      - wait: 20m
      - user: CEO

incident:
  alerts_firing_notifications: False 
  alerts_resolved_notifications: False
  timeouts:
    firing: 6h
    unknown: 6h
    resolved: 12h

webhooks:
  Dmitry_call:
    url: 'https://api.twilio.com/2010-04-01/Accounts/{{ env["TWILIO_ACCOUNT_SID"] }}/Calls.json'
    data:
      To: '+998123456789'
      From: '{{ env["TWILIO_NUMBER"] }}'
      Url: http://example.com/twiml.xml
    auth: '{{ env["TWILIO_ACCOUNT_SID"] }}:{{ env["TWILIO_AUTH_TOKEN"] }}'

route:
  channel: incidents_default
  routes:
    - matchers:
        - service=~"nginx|postgresql"
      channel: incidents_infrastructure
      chain: devops
      routes:
        - matchers:
            - severity="critical"
          channel: incidents_infrastructure
          chain: devops_critical
    - matchers:
        - service=~"vscode|pycharm"
      channel: incidents_services
      chain: developers

ui:
  columns:
    - name: status
      header: Status
      visible: false
      value: incident.status
    - name: created
      type: datetime
      header: Created
      value: incident.created
    - name: alertname
      header: Alertname
      type: link
      url: incident.link
      value: payload.commonLabels.alertname
    - name: service
      header: Service
      value: payload.commonLabels.service
    - name: severity
      header: Severity
      value: payload.commonLabels.severity
    - name: assigned
      header: Assigned To
      value: incident.assigned_fullname
  sorting:
    - severity: desc
      order: ["info", "warning", "critical"]
    - created: desc
  colors:
    severity:
      critical: "#FF0000"
      warning: "#FFA500"
      info: "#00FF00"
